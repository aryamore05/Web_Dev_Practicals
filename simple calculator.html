<!DOCTYPE html>
<html>

<head>

    <title>Simple Calculator</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f4f4;
        }

        h2 {
            color: #333;
        }

        .calculator {
            background-color: #ffffff;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 320px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #444;
            font-weight: 500;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 8px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input[type="button"] {
            width: 100%;
            padding: 10px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 6px;
        }

        input[type="button"]:hover {
            background-color: #0b5ed7;
        }

        #result {
            margin-top: 18px;
            padding: 12px;
            background-color: #f0f4ff;
            border: 1px solid #b3c6ff;
            border-radius: 4px;
            font-size: 16px;
            color: #1a1a2e;
            min-height: 20px;
        }

    </style>

</head>

<body>

    <h2>Simple Calculator</h2>

    <div class="calculator">

        <div class="form-group">

            <label for="num1">First Number:</label>

            <input type="number"
                   id="num1"
                   placeholder="Enter first number">

        </div>

        <div class="form-group">

            <label for="operator">Operator:</label>

            <select id="operator">

                <option value="+">
                    + Addition
                </option>

                <option value="-">
                    − Subtraction
                </option>

                <option value="*">
                    × Multiplication
                </option>

                <option value="/">
                    ÷ Division
                </option>

            </select>

        </div>

        <div class="form-group">

            <label for="num2">Second Number:</label>

            <input type="number"
                   id="num2"
                   placeholder="Enter second number">

        </div>

        <input type="button"
               value="Calculate"
               onclick="calculate()">

        <div id="result"></div>

    </div>

    <script>

        function calculate() {

            var num1 =
                parseFloat(document.getElementById("num1").value);

            var num2 =
                parseFloat(document.getElementById("num2").value);

            var operator =
                document.getElementById("operator").value;

            var result;

            if (isNaN(num1) || isNaN(num2)) {

                document.getElementById("result").textContent =
                    "Error: Please enter valid numbers.";

                return;
            }

            switch (operator) {

                case "+":
                    result = num1 + num2;
                    break;

                case "-":
                    result = num1 - num2;
                    break;

                case "*":
                    result = num1 * num2;
                    break;

                case "/":

                    if (num2 === 0) {

                        document.getElementById("result").textContent =
                            "Error: Division by zero is not allowed.";

                        return;
                    }

                    result = num1 / num2;
                    break;

                default:

                    document.getElementById("result").textContent =
                        "Invalid Operator";

                    return;
            }

            document.getElementById("result").textContent =
                "Result: " + num1 + " " + operator + " " + num2 + " = " + result;
        }

    </script>

</body>

</html>
